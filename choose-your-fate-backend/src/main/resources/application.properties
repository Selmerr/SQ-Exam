spring.application.name=choose-your-fate-backend
spring.config.import=optional:file:./.env[.properties],optional:file:./choose-your-fate-backend/.env[.properties]


spring.datasource.url=${MYSQL_URI:jdbc:mysql://localhost:3307/choose_your_fate}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:${MYSQL_ROOT_PASSWORD:123456}}

spring.neo4j.database=${NEO4J_DATABASE:neo4j}
spring.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=${NEO4J_USERNAME:neo4j}
spring.neo4j.authentication.password=${NEO4J_PASSWORD:12345678}

#tells Hibernate to not rewrite our schema
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


