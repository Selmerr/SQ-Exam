# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  
jobs:
  build:

    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./fake_info
        
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package
      
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v7.0.1
      with:
        # Artifact name. If the `archive` input is `false`, the name of the file uploaded will be the artifact name.
        name: 'backend-snapshot.jar'
        # A file, directory or wildcard pattern that describes what to upload.
        path: /choose-your-fate-backend/target/choose-your-fate-backend-0.0.1-SNAPSHOT.jar
        # Duration after which artifact will expire in days. 0 means using default retention.
        retention-days: 2          
