name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  
jobs:
  build:

    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./choose-your-fate-backend
        
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B clean package -DskipTests
        
  unit_tests:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./choose-your-fate-backend  
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Run Unit Tests
      run: mvn test

  integration_tests:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./choose-your-fate-backend  
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Run Integration Tests
      run: mvn failsafe:integration-test failsafe:verify
